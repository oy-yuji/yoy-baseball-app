<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .athlete-action-grid {
        width: min(560px, 100%);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .athlete-action-card {
        aspect-ratio: 1 / 1;
        border-radius: 18px;
        text-decoration: none;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 1rem;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .athlete-action-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 24px rgba(0, 0, 0, 0.24);
        color: #fff;
      }

      .athlete-action-card i {
        font-size: 2rem;
        margin-bottom: 0.7rem;
      }

      .dumbbell-icon {
        width: 52px;
        height: 52px;
        margin-bottom: 0.7rem;
        filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.28));
      }

      .dumbbell-icon path,
      .dumbbell-icon rect,
      .dumbbell-icon line {
        stroke: #ffffff;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .athlete-action-title {
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.2;
      }

      .action-start-day {
        background: linear-gradient(145deg, #3167ff, #1f45b3);
      }

      .action-calendar {
        background: linear-gradient(145deg, #18a2d8, #117398);
      }

      @media (max-width: 576px) {
        .athlete-action-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Baseball App</a>
        <div class="d-flex align-items-center">
          <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
          <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
        </div>
      </div>
    </nav>
    <div style="height:56px;"></div>
    <div class="d-flex flex-column justify-content-center align-items-center mt-5">
      <h1 class="display-5 mb-2">Welcome</h1>
      <h2 class="h4" id="userFullName"></h2>
      <div class="athlete-action-grid mt-4">
        <a id="startDayBtn" class="athlete-action-card action-start-day" href="start-day.html">
          <svg class="dumbbell-icon" viewBox="0 0 64 64" aria-hidden="true" role="img" focusable="false">
            <line x1="23" y1="32" x2="41" y2="32"></line>
            <rect x="16" y="25" width="4" height="14" rx="1"></rect>
            <rect x="11" y="22" width="4" height="20" rx="1"></rect>
            <rect x="44" y="25" width="4" height="14" rx="1"></rect>
            <rect x="49" y="22" width="4" height="20" rx="1"></rect>
          </svg>
          <span class="athlete-action-title">Start My Day</span>
        </a>
        <a id="calendarBtn" class="athlete-action-card action-calendar" href="calendar.html">
          <i class="bi bi-calendar2-week-fill" aria-hidden="true"></i>
          <span class="athlete-action-title">Calendar</span>
        </a>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    (async function(){
      if (!window.sb || !document.getElementById('calendarBtn')) return;
      const btn = document.getElementById('calendarBtn');
      try {
        const { data: sessData, error: sessErr } = await window.sb.auth.getSession();
        if (sessErr) throw sessErr;
        const uid = sessData?.session?.user?.id;
        if (!uid) return;
        // Try to find athlete record for this user
        const { data: athleteRec, error: athErr } = await window.sb.from('athletes').select('id, user_id').eq('user_id', uid).maybeSingle();
        if (athErr) console.warn('athlete lookup error', athErr);
        const athleteId = athleteRec?.id || '';
        if (athleteId) {
          btn.href = 'calendar.html?athlete=' + athleteId;
          console.log('Set calendar link to athlete id', athleteId);
        } else {
          // fallback: pass user id so calendar page can resolve athlete from user id
          btn.href = 'calendar.html?athlete=' + uid;
          console.log('No athlete row found; falling back to user id', uid);
        }
      } catch (e) {
        console.error('Failed to set calendar link', e);
      }
    })();
  </script>
</html>
