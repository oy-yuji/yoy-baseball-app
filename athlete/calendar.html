<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athlete Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <style>
      .athlete-calendar-shell {
        max-width: 980px;
      }

      .athlete-calendar-header {
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 10px;
      }

      .program-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .program-modal-card {
        background: #fff;
        border-radius: 10px;
        max-width: 760px;
        width: 92%;
        max-height: 82vh;
        overflow: auto;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      :root[data-theme='dark'] .athlete-calendar-header {
        border-bottom-color: #334155;
      }

      :root[data-theme='dark'] .program-modal-card {
        background: #111827;
        border: 1px solid #334155;
        color: #e2e8f0;
      }

      :root[data-theme='dark'] .fc,
      :root[data-theme='dark'] .fc .fc-scrollgrid,
      :root[data-theme='dark'] .fc .fc-daygrid-day,
      :root[data-theme='dark'] .fc .fc-col-header-cell,
      :root[data-theme='dark'] .fc-theme-standard td,
      :root[data-theme='dark'] .fc-theme-standard th {
        border-color: #334155 !important;
      }

      :root[data-theme='dark'] .fc .fc-scrollgrid,
      :root[data-theme='dark'] .fc-theme-standard .fc-scrollgrid {
        background: #0b1220 !important;
      }

      :root[data-theme='dark'] .fc .fc-col-header,
      :root[data-theme='dark'] .fc .fc-col-header-cell,
      :root[data-theme='dark'] .fc .fc-col-header-cell-cushion {
        background: #111827 !important;
      }

      :root[data-theme='dark'] .fc .fc-daygrid-day-frame,
      :root[data-theme='dark'] .fc .fc-col-header-cell-cushion,
      :root[data-theme='dark'] .fc .fc-daygrid-day-number,
      :root[data-theme='dark'] .fc .fc-toolbar-title {
        color: #e2e8f0 !important;
      }

      :root[data-theme='dark'] .fc .fc-button-primary {
        background-color: #1e293b !important;
        border-color: #334155 !important;
      }

      :root[data-theme='dark'] .fc .fc-button-primary:hover,
      :root[data-theme='dark'] .fc .fc-button-primary:focus {
        background-color: #334155 !important;
        border-color: #475569 !important;
      }

      :root[data-theme='dark'] .fc .fc-day-today {
        background: rgba(59, 130, 246, 0.12) !important;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Baseball App</a>
        <div class="d-flex align-items-center">
          <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
          <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
        </div>
      </div>
    </nav>
    <div style="height:56px;"></div>
    <div class="container mt-3 athlete-calendar-shell">
      <div id="calendarHeader" class="athlete-calendar-header mb-3"></div>
      <div id="calendarContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="calendar.js"></script>
  </body>
</html>
