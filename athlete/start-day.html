<!doctype html>
<html lang="en">
	<head>
    <script src='../js/theme-init.js'></script>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Start Day</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
			crossorigin="anonymous"
		/>
	</head>
	<body>
		<nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
			<div class="container-fluid">
				<a class="navbar-brand" href="#">Baseball App</a>
				<div class="d-flex align-items-center">
					<span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
					<button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
				</div>
			</div>
		</nav>

		<div style="height:56px;"></div>

		<main class="container py-4">
			<div class="card border-0 shadow-sm mb-3">
				<div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3">
					<div>
						<h1 class="h3 mb-1">Start Your Day</h1>
						<div class="d-flex align-items-center gap-2">
							<button id="prevDayBtn" class="btn btn-sm btn-outline-secondary" type="button" aria-label="Previous day">←</button>
							<button id="todayBtn" class="btn btn-sm btn-outline-primary" type="button">Today</button>
							<p class="text-muted mb-0 fw-medium" id="todayLabel"></p>
							<button id="nextDayBtn" class="btn btn-sm btn-outline-secondary" type="button" aria-label="Next day">→</button>
						</div>
					</div>
					<a class="btn btn-outline-secondary" href="dashboard.html">Back</a>
				</div>
			</div>

			<div id="pageAlert"></div>

			<div id="scheduleMeta" class="mb-3"></div>

			<div id="scheduleContent">
				<div class="card border-0 shadow-sm">
					<div class="card-body text-muted">Loading today's schedule...</div>
				</div>
			</div>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
		<script src="../js/supabase.js"></script>
		<script src="../js/navbar.js"></script>
		<script src="start-day.js"></script>
	</body>
</html>
