<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>My Athletes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
      .sortable-header {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        color: inherit;
        font-weight: 700;
        font-size: 0.9rem;
        border: 0;
        background: transparent;
        padding: 0.1rem 0.15rem;
        border-radius: 0.4rem;
        transition: background-color 0.15s ease, color 0.15s ease;
      }

      .sortable-header:hover {
        background: rgba(15, 23, 42, 0.08);
        color: #0f172a;
      }

      .sortable-header:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 1px;
      }

      .sortable-header .sort-indicator {
        min-width: 0.8rem;
        display: inline-block;
        font-size: 0.75rem;
        color: #64748b;
      }

      :root[data-theme='dark'] .sortable-header:hover {
        background: rgba(148, 163, 184, 0.16);
        color: #e2e8f0;
      }

      :root[data-theme='dark'] .sortable-header .sort-indicator {
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Baseball App</a>
        <div class="d-flex align-items-center">
          <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
          <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
        </div>
      </div>
    </nav>
    <div style="height:56px;"></div>

    <div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>My Athletes</h2>
        <a href="dashboard.html" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Back to Dashboard
        </a>
      </div>
      <div id="alertContainer" class="mb-3"></div>
      <div class="d-flex justify-content-end align-items-center gap-2 mb-2">
        <label for="athleteSearchInput" class="small text-muted mb-0">Search</label>
        <input
          type="search"
          id="athleteSearchInput"
          class="form-control form-control-sm"
          style="max-width: 240px;"
          placeholder="Athlete name"
          autocomplete="off"
        />
        <div id="athleteSearchMeta" class="small text-muted"></div>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0" id="athletesTable">
              <thead>
                <tr>
                  <th><button type="button" class="sortable-header" data-key="full_name">Name <span class="sort-indicator"></span></button></th>
                  <th><button type="button" class="sortable-header" data-key="email">Email <span class="sort-indicator"></span></button></th>
                  <th><button type="button" class="sortable-header" data-key="position">Position <span class="sort-indicator"></span></button></th>
                  <th><button type="button" class="sortable-header" data-key="height_cm">Height (cm) <span class="sort-indicator"></span></button></th>
                  <th><button type="button" class="sortable-header" data-key="weight_lbs">Weight (lbs) <span class="sort-indicator"></span></button></th>
                  <th><button type="button" class="sortable-header" data-key="birthday">Birthday <span class="sort-indicator"></span></button></th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="athletesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="athletes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
