<!DOCTYPE html>
<html lang="en">
<head>
    <script src='../js/theme-init.js'></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Program</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .program-shell {
            min-height: 100vh;
            padding-bottom: 2rem;
        }

        .program-card {
            max-width: 900px;
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
        }

        .program-column {
            min-height: 220px;
            max-height: 420px;
            overflow-y: auto;
            border: 1px solid #d0d7de;
            border-radius: 10px;
            background: #f8fafc;
            padding: 0.35rem;
        }

        .workout-category-block {
            border: 1px solid #dbe4ee;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .category-header {
            cursor: pointer;
            border-radius: 0;
            background: #334155;
            color: #f8fafc;
            padding: 0.45rem 0.65rem;
        }

        .workout-draggable {
            cursor: pointer;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin: 0.35rem;
            background: #ffffff;
        }

        .workout-details {
            border-top: 1px dashed #cbd5e1;
            margin-top: 0.45rem;
            padding-top: 0.45rem;
        }

        .sortable-ghost {
            opacity: 0.6;
            background: #dbeafe !important;
        }

        :root[data-theme='dark'] .program-card {
            background: #0f172a !important;
            border-color: #334155;
            box-shadow: 0 16px 36px rgba(2, 6, 23, 0.45) !important;
        }

        :root[data-theme='dark'] .program-column {
            background: #0b1220;
            border-color: #334155;
        }

        :root[data-theme='dark'] .workout-category-block,
        :root[data-theme='dark'] .workout-draggable {
            background: #111827;
            border-color: #334155;
            color: #e2e8f0;
        }

        :root[data-theme='dark'] .category-header {
            background: #1e293b;
            color: #f8fafc;
            border-bottom: 1px solid #334155;
        }

        :root[data-theme='dark'] .workout-details {
            border-top-color: #334155;
        }

        :root[data-theme='dark'] .workout-details .text-muted {
            color: #94a3b8 !important;
        }

        :root[data-theme='dark'] .sortable-ghost {
            background: #1d4ed8 !important;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">Baseball App</a>
        </div>
    </nav>
    <div style="height:56px;"></div>
    <div class="container d-flex flex-column align-items-center justify-content-center program-shell">
        <div class="mb-3 w-100 text-end" style="max-width:900px;">
            <a href="dashboard.html" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
                <i class="bi bi-arrow-left" aria-hidden="true"></i>
                Back to Dashboard
            </a>
        </div>
        <div class="card shadow-sm p-4 program-card">
            <h2 class="mb-4 text-center">Create a Program</h2>
            <form id="programForm">
                <div class="mb-3">
                    <label for="programName" class="form-label">Program Name</label>
                    <input type="text" class="form-control" id="programName" name="programName" required>
                </div>
                <div class="mb-3">
                    <label for="programDescription" class="form-label">Description</label>
                    <textarea class="form-control" id="programDescription" name="programDescription" rows="2"></textarea>
                </div>
                <div class="mb-3 row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Available Workouts</label>
                        <div id="workoutSidebar" class="list-group mb-2 program-column"></div>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Program Sequence (drag here)</label>
                        <div id="programContainer" class="list-group mb-2 program-column"></div>
                        <small class="text-muted">Drag workouts from the left. Assign a day/label to each.</small>
                    </div>
                </div>
                                <div id="programAlert"></div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Create Program</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
    <script src="make-program.js"></script>
</body>
</html>
