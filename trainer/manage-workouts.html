<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Workouts</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position: fixed; top: 0; width: 100%; z-index: 1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">Baseball App</a>
      </div>
    </nav>

    <div style="height:56px;"></div>

    <main class="container py-4" style="max-width: 980px;">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div>
          <h1 class="h3 mb-1">Manage Workouts</h1>
          <p class="text-muted mb-0">Drag to reorder exercises, edit sets/reps/rest, or delete workouts you no longer need.</p>
        </div>
        <a href="dashboard.html" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Back
        </a>
      </div>

      <div id="pageAlert"></div>
      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <label for="workoutSearchInput" class="form-label mb-1">Search Workouts</label>
          <input
            id="workoutSearchInput"
            type="search"
            class="form-control"
            placeholder="Type to filter by workout name, category, exercise name, reps, sets, or rest"
            autocomplete="off"
          />
          <div id="workoutSearchMeta" class="small text-muted mt-2"></div>
        </div>
      </div>
      <div id="workoutsContainer" class="vstack gap-3"></div>
      <div id="workoutSearchEmpty" class="alert alert-info d-none mt-3 mb-0">No workouts match your search.</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="manage-workouts.js"></script>
  </body>
</html>
