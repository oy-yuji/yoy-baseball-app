<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make a Workout</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>

  <body class="bg-light">
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-secondary"
      style="position: fixed; top: 0; width: 100%; z-index: 1000"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">Baseball App</a>
      </div>
    </nav>
    <div style="height: 56px"></div>
    <div
      class="container d-flex flex-column align-items-center justify-content-center"
      style="min-height: 100vh"
    >
      <div class="mb-3 w-100 text-end" style="max-width: 600px">
        <a href="dashboard.html" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Back to Dashboard
        </a>
      </div>
      <div class="card shadow-sm p-4" style="max-width: 900px; width: 100%">
        <h2 class="mb-4 text-center">Create a Workout</h2>
        <form id="workoutForm">
          <div class="mb-3">
            <label for="workoutName" class="form-label">Workout Name</label>
            <input
              type="text"
              class="form-control"
              id="workoutName"
              name="workoutName"
              required
            />
          </div>
          <div class="mb-3">
            <label for="workoutCategory" class="form-label">Category</label>
            <select id="workoutCategory" class="form-select" name="workoutCategory">
              <option value="warmup">Warmup</option>
              <option value="upper">Upper Body</option>
              <option value="lower">Lower Body</option>
              <option value="pitching">Pitching</option>
              <option value="hitting">Hitting</option>
              <option value="hybrid">Hybrid</option>
              <option value="conditioning">Conditioning</option>
              <option value="other" selected>Other</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="workoutNotes" class="form-label">Workout Notes</label>
            <textarea
              class="form-control"
              id="workoutNotes"
              name="workoutNotes"
              rows="3"
              placeholder="Any overall coaching notes for this workout..."
            ></textarea>
          </div>
          <div class="mb-3">
            <div id="exerciseList" class="list-group mb-2">
              <!-- Exercises will be loaded here -->
            </div>
          </div>

          <button
            id="addExerciseBtn"
            type="button"
            class="btn btn-outline-primary mb-2"
          >
            Add Exercise
          </button>
          <button
            id="addSupersetBtn"
            type="button"
            class="btn btn-outline-secondary mb-2 ms-2"
          >
            Add Superset Pair
          </button>
          <p class="text-muted small mt-1">
            Use + Superset on any row to add a paired movement quickly. Superset rows are saved with an SS label in reps.
          </p>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              Create Workout
            </button>
          </div>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
    <script src="make-workout.js"></script>
  </body>
</html>
