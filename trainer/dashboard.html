<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .trainer-action-grid {
        width: min(760px, 100%);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .trainer-action-card {
        aspect-ratio: 1 / 1;
        border-radius: 18px;
        text-decoration: none;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 1rem;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .trainer-action-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 24px rgba(0, 0, 0, 0.24);
        color: #fff;
      }

      .trainer-action-card i {
        font-size: 2rem;
        margin-bottom: 0.7rem;
      }

      .trainer-action-title {
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1.2;
      }

      .action-add-athlete {
        background: linear-gradient(145deg, #3167ff, #1f45b3);
      }

      .action-athletes {
        background: linear-gradient(145deg, #6b7280, #4b5563);
      }

      .action-exercise {
        background: linear-gradient(145deg, #f0ad2c, #c78511);
      }

      .action-workout {
        background: linear-gradient(145deg, #23bb72, #18824f);
      }

      .action-program {
        background: linear-gradient(145deg, #18a2d8, #117398);
      }

      .action-manage-workouts {
        background: linear-gradient(145deg, #d94675, #a21caf);
      }

      @media (max-width: 576px) {
        .trainer-action-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Baseball App</a>
        <div class="d-flex align-items-center">
          <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
          <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
        </div>
      </div>
    </nav>
    <div style="height:56px;"></div>
    <div class="d-flex flex-column justify-content-center align-items-center mt-5">
      <h1 class="display-5 mb-2">Welcome</h1>
      <h2 class="h4" id="userFullName"></h2>
      <div class="trainer-action-grid mt-4">
        <a href="../admin/add-athlete.html" class="trainer-action-card action-add-athlete">
          <i class="bi bi-person-plus-fill" aria-hidden="true"></i>
          <span class="trainer-action-title">Add Athlete</span>
        </a>
        <a href="athletes.html" class="trainer-action-card action-athletes">
          <i class="bi bi-people-fill" aria-hidden="true"></i>
          <span class="trainer-action-title">My Athletes</span>
        </a>
        <a href="add-exercise.html" class="trainer-action-card action-exercise">
          <i class="bi bi-plus-square-fill" aria-hidden="true"></i>
          <span class="trainer-action-title">Add Exercise</span>
        </a>
        <a href="make-workout.html" class="trainer-action-card action-workout">
          <i class="bi bi-clipboard2-pulse-fill" aria-hidden="true"></i>
          <span class="trainer-action-title">Make a Workout</span>
        </a>
        <a href="make-program.html" class="trainer-action-card action-program">
          <i class="bi bi-journal-richtext" aria-hidden="true"></i>
          <span class="trainer-action-title">Make a Program</span>
        </a>
        <a href="manage-workouts.html" class="trainer-action-card action-manage-workouts">
          <i class="bi bi-sliders" aria-hidden="true"></i>
          <span class="trainer-action-title">Manage Workouts</span>
        </a>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/navbar.js"></script>
</html>
