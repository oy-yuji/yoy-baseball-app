<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trainer Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <style>
      .calendar-program-sidebar {
        position: fixed;
        left: 0;
        top: 56px;
        width: 220px;
        bottom: 0;
        height: auto;
        background: #f8fafc;
        border-right: 1px solid #dbe4ee;
        padding: 10px;
        overflow: hidden;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .calendar-sidebar-section {
        margin-bottom: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1;
      }

      .calendar-sidebar-label {
        font-size: 0.82rem;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .calendar-sidebar-search {
        margin-bottom: 6px;
      }

      .calendar-sidebar-list {
        max-height: none;
        min-height: 0;
        flex: 1;
        overflow-y: auto;
        padding-right: 2px;
      }

      .calendar-workout-chip {
        cursor: grab;
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 8px;
      }

      .calendar-wrapper {
        margin-left: 220px;
        padding: 0 24px;
        margin-top: 8px;
      }

      .calendar-header {
        padding: 8px 0;
        border-bottom: 1px solid #e2e8f0;
        margin: 0 0 8px 0;
      }

      .calendar-program-chip {
        cursor: grab;
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 8px;
      }

      .calendar-program-details {
        padding: 8px 10px;
        margin: 6px 0 12px 0;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 0.9rem;
      }

      .program-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .program-modal-card {
        background: #fff;
        border-radius: 10px;
        max-width: 760px;
        width: 92%;
        max-height: 82vh;
        overflow: auto;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      .fc {
        --fc-border-color: #dbe4ee;
      }

      :root[data-theme='dark'] .calendar-program-sidebar {
        background: #0b1220;
        border-right-color: #334155;
      }

      :root[data-theme='dark'] .calendar-header {
        border-bottom-color: #334155;
      }

      :root[data-theme='dark'] .calendar-program-chip,
      :root[data-theme='dark'] .calendar-workout-chip,
      :root[data-theme='dark'] .calendar-program-details,
      :root[data-theme='dark'] .program-modal-card {
        background: #111827;
        border-color: #334155;
        color: #e2e8f0;
      }

      :root[data-theme='dark'] .calendar-sidebar-list,
      :root[data-theme='dark'] .calendar-sidebar-search {
        color: #e2e8f0;
      }

      :root[data-theme='dark'] .fc,
      :root[data-theme='dark'] .fc .fc-scrollgrid,
      :root[data-theme='dark'] .fc .fc-daygrid-day,
      :root[data-theme='dark'] .fc .fc-col-header-cell,
      :root[data-theme='dark'] .fc-theme-standard td,
      :root[data-theme='dark'] .fc-theme-standard th {
        border-color: #334155 !important;
      }

      :root[data-theme='dark'] .fc .fc-scrollgrid,
      :root[data-theme='dark'] .fc .fc-daygrid-body,
      :root[data-theme='dark'] .fc-theme-standard .fc-scrollgrid {
        background: #0b1220 !important;
      }

      :root[data-theme='dark'] .fc .fc-col-header,
      :root[data-theme='dark'] .fc .fc-col-header-cell,
      :root[data-theme='dark'] .fc .fc-col-header-cell-cushion {
        background: #111827 !important;
      }

      :root[data-theme='dark'] .fc .fc-daygrid-day-frame,
      :root[data-theme='dark'] .fc .fc-col-header-cell-cushion,
      :root[data-theme='dark'] .fc .fc-daygrid-day-number,
      :root[data-theme='dark'] .fc .fc-toolbar-title {
        color: #e2e8f0 !important;
      }

      :root[data-theme='dark'] .fc .fc-button-primary {
        background-color: #1e293b !important;
        border-color: #334155 !important;
      }

      :root[data-theme='dark'] .fc .fc-button-primary:hover,
      :root[data-theme='dark'] .fc .fc-button-primary:focus {
        background-color: #334155 !important;
        border-color: #475569 !important;
      }

      :root[data-theme='dark'] .fc .fc-day-today {
        background: rgba(59, 130, 246, 0.12) !important;
      }

      :root[data-theme='dark'] .fc .fc-event {
        border-color: #1d4ed8;
      }

      @media (max-width: 992px) {
        .calendar-program-sidebar {
          position: static;
          width: auto;
          height: auto;
          bottom: auto;
          border-right: 0;
          border-bottom: 1px solid #dbe4ee;
          overflow: visible;
          display: block;
          gap: 0;
        }

        .calendar-sidebar-section {
          display: block;
        }

        .calendar-sidebar-list {
          max-height: 220px;
        }

        .calendar-wrapper {
          margin-left: 0;
          padding: 0 12px 20px;
        }
      }
    </style>
  </head>
  <body class="bg-light">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
    <script src="calendar.js?v=20260426-quickfix"></script>
  </body>
</html>
