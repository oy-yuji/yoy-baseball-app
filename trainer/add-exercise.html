<!DOCTYPE html>
<html lang="en">
<head>
    <script src='../js/theme-init.js'></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add an Exercise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<script src="add-exercise.js"></script>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">Baseball App</a>
        </div>
    </nav>

   
    <div style="height:56px;"></div>
    <div class="container d-flex flex-column align-items-center justify-content-center" style="min-height:100vh;">
        <div class="mb-3 w-100 text-end" style="max-width:500px;">
            <a href="dashboard.html" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
                <i class="bi bi-arrow-left" aria-hidden="true"></i>
                Back to Dashboard
            </a>
        </div>
        <div class="card shadow-sm p-4" style="max-width:500px;width:100%;">
            <h2 class="mb-4 text-center">Add an Exercise</h2>
            <form id="exerciseForm">
            
                <div class="mb-3">
                    <label for="name" class="form-label">Exercise Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="warmup">Warmup</option>
                        <option value="upper">Upper Body</option>
                        <option value="lower">Lower Body</option>
                        <option value="pitching">Pitching</option>
                        <option value="hitting">Hitting</option>
                        <option value="plyometric">Plyometric</option>
                        <option value="conditioning">Conditioning</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="demo_video_url" class="form-label">Demo Video URL</label>
                    <input type="url" class="form-control" id="demo_video_url" name="demo_video_url" placeholder="https://...">
                </div>
                <div class="mb-3">
                    <label for="notes" class="form-label">Notes</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Any special instructions..."></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Add Exercise</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
</body>
</body>
</html>
