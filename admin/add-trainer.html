<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Trainer</title>
    <style>
      .password-help-note {
        margin-top: 0.55rem;
        padding: 0.55rem 0.7rem;
        border-radius: 0.5rem;
        border: 1px solid #b6d4fe;
        background: #e7f1ff;
        color: #084298;
        font-size: 0.92rem;
        font-weight: 600;
      }
      :root[data-theme='dark'] .password-help-note {
        border-color: #334155;
        background: #152238;
        color: #dbeafe;
      }
    </style>
  </head>
  <body>
    <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Baseball App</a>
        <div class="d-flex align-items-center">
          <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
          <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
        </div>
      </div>
    </nav>
    <div style="height:56px;"></div>
    <div class="container mt-5 pt-5">
     
      <h2>Add New Trainer</h2>
      <form id="registerForm">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Temporary Password</label>
          <input type="password" class="form-control" id="password" name="password" minlength="8" />
          <div class="password-help-note">If you enter a password, it must be at least 8 characters. Leave blank to send an email setup link.</div>
        </div>
        <div class="mb-3">
          <label for="full_name" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="full_name" name="full_name" required />
        </div>
        <!-- role selector kept to reuse shared script; default to trainer -->
        <div class="mb-3" style="display:none;">
          <label for="roleSelect" class="form-label">Role</label>
          <select id="roleSelect" name="role" class="form-select">
            <option value="trainer" selected>trainer</option>
            <option value="athlete">athlete</option>
            <option value="admin">admin</option>
          </select>
        </div>

        <!-- trainer-specific fields (kept for compatibility) -->
        <div id="trainerFields">
          <div class="mb-3">
            <label for="bio" class="form-label">Bio (optional)</label>
            <textarea id="bio" name="bio" class="form-control" rows="3"></textarea>
          </div>
        </div>

        <button type="submit" class="btn btn-success">Create Trainer</button>
        <a href="panel.html" class="btn btn-secondary ms-2">Cancel</a>
      </form>

       <div id="alertContainer" class="mt-3 mb-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="add-user.js"></script>
  </body>
</html>
