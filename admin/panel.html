<!DOCTYPE html>
<html lang="en">
<head>
    <script src='../js/theme-init.js'></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .admin-action-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
            max-width: 560px;
            margin: 0 auto;
        }

        .admin-panel-wrap {
            max-width: 760px;
            margin: 0 auto;
            text-align: center;
        }

        .admin-action-card {
            aspect-ratio: 1 / 1;
            border-radius: 18px;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .admin-action-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.24);
            color: #fff;
        }

        .admin-action-card i {
            font-size: 2rem;
            margin-bottom: 0.7rem;
        }

        .admin-action-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .action-trainer {
            background: linear-gradient(145deg, #3167ff, #1f45b3);
        }

        .action-list {
            background: linear-gradient(145deg, #18a2d8, #117398);
        }

        .action-plan {
            background: linear-gradient(145deg, #23bb72, #18824f);
        }

        .action-exercise {
            background: linear-gradient(145deg, #f0ad2c, #c78511);
        }
    </style>
</head>
<body>
                <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
                    <div class="container-fluid">
                        <a class="navbar-brand" href="#">Baseball App</a>
                        <div class="d-flex align-items-center">
                              <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
                            <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
                        </div>
                    </div>
                </nav>
                <div style="height:56px;"></div>
                <div class="container mt-4 admin-panel-wrap">
            <h1>Welcome Admin</h1>
            <div class="admin-action-grid mt-3">
                <a href="add-trainer.html" class="admin-action-card action-trainer">
                    <i class="bi bi-person-plus-fill" aria-hidden="true"></i>
                    <span class="admin-action-title">Add New Trainer</span>
                </a>
                <a href="trainers-list.html" class="admin-action-card action-list">
                    <i class="bi bi-people-fill" aria-hidden="true"></i>
                    <span class="admin-action-title">View All Trainers</span>
                </a>
            </div>
        </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/navbar.js"></script>
</html>
