<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Trainers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
      /* GitHub-like subtle striped background */
      .ghtable tbody tr:nth-of-type(odd) {
        background-color: #f6f8fa;
      }
      .ghtable thead {
        background-color: #f6f8fa;
      }
      .page-header { display:flex; align-items:center; justify-content:space-between; gap:1rem }
    </style>
  </head>
  <body>
    <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Baseball App</a>
        <div class="d-flex align-items-center">
          <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
          <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
        </div>
      </div>
    </nav>
    <div style="height:56px;"></div>

    <div class="container mt-4">
      <div class="page-header mb-3">
        <h2 class="m-0">All Trainers</h2>
        <div>
          <a href="panel.html" class="btn btn-secondary">Back to Admin Panel</a>
        </div>
      </div>

      <div id="alertContainer" class="mb-3"></div>

      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table ghtable table-hover mb-0" id="trainersTable">
              <thead>
                <tr>
                  <th scope="col">Name</th>
                  <th scope="col">Email</th>
                </tr>
              </thead>
              <tbody id="trainersTableBody">
                <!-- trainers rows -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="container mt-4" id="athletesSection" style="display:none;">
      <div class="page-header mb-3">
        <h3 id="athletesHeading" class="m-0">Athletes for <span id="selectedTrainerName"></span></h3>
        <div>
          <button id="closeAthletes" class="btn btn-secondary">Close</button>
        </div>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table ghtable table-hover mb-0" id="athletesTable">
              <thead>
                <tr>
                  <th scope="col">Name</th>
                  <th scope="col">Email</th>
                  <th scope="col">Position</th>
                  <th scope="col">Height (cm)</th>
                  <th scope="col">Weight (lbs)</th>
                  <th scope="col">Birthday</th>
                </tr>
              </thead>
              <tbody id="athletesTableBody">
                <!-- athletes rows -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/admin/trainers-list.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
