<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Athlete</title>
    <style>
      .password-help-note {
        margin-top: 0.6rem;
        padding: 0.7rem 0.85rem;
        border-radius: 0.65rem;
        border: 1px solid #8fb8ff;
        background: #dbeafe;
        color: #052c65;
        font-size: 1rem;
        line-height: 1.45;
        font-weight: 700;
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .password-help-note i {
        margin-top: 0.1rem;
      }
      :root[data-theme='dark'] .password-help-note {
        border-color: #3b82f6;
        background: #0b1d35;
        color: #e0ecff;
      }
    </style>
  </head>
  <body>
    <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Baseball App</a>
        <div class="d-flex align-items-center">
          <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
          <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
        </div>
      </div>
    </nav>
    <div style="height:56px;"></div>
    <div class="container mt-5 pt-5">
      <div class="d-flex justify-content-end mb-3">
        <a href="../trainer/dashboard.html" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Back to Dashboard
        </a>
      </div>
      <h2>Add New Athlete</h2>
      <form id="registerForm">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Temporary Password (optional)</label>
          <input type="password" class="form-control" id="password" name="password" minlength="8" />
          <div class="password-help-note"><i class="bi bi-envelope-check-fill" aria-hidden="true"></i><span>If entered, password must be at least 8 characters. If left blank, athlete will receive an auth email to set their password.</span></div>
        </div>
        <div class="mb-3">
          <label for="full_name" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="full_name" name="full_name" required />
        </div>
        <input type="hidden" name="role" value="athlete" />
        <div class="mb-3">
          <input type="hidden" id="trainer_id" name="trainer_id" />
        </div>
        <div class="mb-3">
          <label for="position" class="form-label">Position</label>
          <input type="text" class="form-control" id="position" name="position" />
        </div>
        <div class="mb-3">
          <label for="height_cm" class="form-label">Height (cm)</label>
          <input type="number" class="form-control" id="height_cm" name="height_cm" />
        </div>
        <div class="mb-3">
          <label for="weight_lbs" class="form-label">Weight (lbs)</label>
          <input type="number" class="form-control" id="weight_lbs" name="weight_lbs" />
        </div>
        <div class="mb-3">
          <label for="birthday" class="form-label">Birthday</label>
          <input type="date" class="form-control" id="birthday" name="birthday" />
        </div>
        <div class="mb-3">
          <label for="throwing_side" class="form-label">Throwing Side</label>
          <select class="form-select" id="throwing_side" name="throwing_side">
            <option value="">Select</option>
            <option value="R">Right</option>
            <option value="L">Left</option>
            <option value="S">Switch</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="batting_side" class="form-label">Batting Side</label>
          <select class="form-select" id="batting_side" name="batting_side">
            <option value="">Select</option>
            <option value="R">Right</option>
            <option value="L">Left</option>
            <option value="S">Switch</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success">Create Athlete</button>
      </form>
      <div id="alertContainer" class="mt-3 mb-3"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/navbar.js"></script>
    <script>
      // Set trainer_id to current user's ID (if logged in as trainer)
      document.addEventListener('DOMContentLoaded', async function() {
        if (window.sb && window.sb.auth) {
          try {
            const { data: { session } } = await window.sb.auth.getSession();
            const userId = session?.user?.id;
            if (userId) {
              document.getElementById('trainer_id').value = userId;
            }
          } catch (e) { console.error('Could not set trainer_id', e); }
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="add-user.js"></script>
  </body>
</html>
