<!doctype html>
<html lang="en">
  <head>
    <script src='../js/theme-init.js'></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Trainer Athletes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  </head>
  <body>
    <nav id="siteNavbar" class="navbar navbar-expand-lg navbar-dark bg-secondary" style="position:fixed;top:0;width:100%;z-index:1000;">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Baseball App</a>
        <div class="d-flex align-items-center">
          <span id="userNavbarName" class="text-light me-3" style="font-size:1rem;"></span>
          <button id="logoutBtn" class="btn btn-outline-light ms-2">Logout</button>
        </div>
      </div>
    </nav>
    <div style="height:56px;"></div>
    <div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 id="pageTitle">Athletes</h2>
        <div>
          <a href="trainers-list.html" class="btn btn-secondary">Back to Trainers</a>
        </div>
      </div>
      <div id="alertContainer" class="mb-3"></div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0" id="athletesTable">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Position</th>
                  <th>Height (cm)</th>
                  <th>Weight (lbs)</th>
                  <th>Birthday</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="athletesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="trainer-athletes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
